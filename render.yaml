# Render Blueprint — VAP (app de carona interno)
# Docs: https://render.com/docs/blueprint-spec
#
# Como usar:
#   1. No Render: New + > Blueprint > conecte este repositório.
#   2. O Render lê este arquivo e cria o web service.
#   3. Preencha as variáveis marcadas com "sync: false" (segredos)
#      no painel — veja DEPLOY-RENDER.md.

services:
  - type: web
    name: vagao
    runtime: node
    # starter (US$7/mês): NÃO hiberna. O plano free dorme por inatividade e o
    # primeiro acesso do dia esperava ~40 s — inaceitável em operação real.
    # Ao crescer, standard (2 GB / 1 CPU) é o próximo degrau: o app faz polling
    # a cada 2–3 s por usuário, então CPU e conexões do Postgres é que apertam.
    plan: starter
    region: ohio # ajuste para a região mais próxima do seu Supabase
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22" # @supabase/supabase-js exige WebSocket nativo (Node >= 22)
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo forte automaticamente
      - key: SUPABASE_BUCKET
        value: veiculos
      - key: RAIO_MATCH_KM
        value: "3"
      - key: VAPID_SUBJECT
        value: mailto:contato@vap.app
      # Segredos — preencha no painel do Render (Environment):
      # Senha do admin semente 000000. Sem ela em produção, se o admin ainda
      # estiver com a senha padrão do schema.sql (admin123), a conta é
      # DESATIVADA no boot por segurança.
      - key: ADMIN_SENHA
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # Routes API (linha pela pista) LIGADA — protegida por: recálculo só por
      # mudança de destino, tetos 30/min-300/dia-9.000/mês no código (persistidos
      # no Postgres) e cota 300/dia no console Google. Ver .env.example.
      - key: GOOGLE_ROUTES_ENABLED
        value: "1"
      # Notificações push — gere o par com:
      #   node -e "console.log(require('web-push').generateVAPIDKeys())"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # Push nativo (Capacitor): JSON da service account Firebase (uma linha).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # Só no plano FREE do Render (hiberna). Starter US$7 não precisa.
      # - key: RENDER_KEEPALIVE
      #   value: "true"
      # Recuperação de senha por email (Resend — resend.com). SEM esta chave a
      # recuperação responde 503 em produção. Crie a API key no painel do Resend.
      - key: RESEND_API_KEY
        sync: false
      # Remetente. Para testes serve "VAP <onboarding@resend.dev>"; em produção
      # use um domínio verificado no Resend.
      - key: EMAIL_FROM
        value: VAP <onboarding@resend.dev>
