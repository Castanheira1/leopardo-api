<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#faf9f5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VAP">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon-192.png" type="image/png">
    <script src="/pwa.js" defer></script>
    <script src="/platform.js"></script>
    <title>Histórico - VAP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ---- Histórico: padrão claro (mesmo estilo da tela de Locais / documentos) ---- */
        :root {
            --h-bg: #faf9f5; --h-card: #fff; --h-ink: #23211c; --h-muted: #6b675f;
            --h-line: #ece8df; --h-gold: #9a7412;
        }
        body.hist-page { background: var(--h-bg); color: var(--h-ink); }
        .hist-page .container { max-width: 720px; margin: 0 auto; padding: 14px 16px 60px; }

        /* Cabeçalho claro: [← voltar] VAP ......... [Sair] */
        .hist-top {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; padding-top: calc(10px + env(safe-area-inset-top));
            background: rgba(250,249,245,.92); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--h-line);
        }
        .hist-back {
            width: 40px; height: 40px; flex: 0 0 auto;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 11px; border: 1px solid var(--h-line);
            background: #fff; color: var(--h-ink); cursor: pointer; text-decoration: none;
        }
        .hist-back:hover { background: #f3f1ea; }
        .hist-back svg { width: 20px; height: 20px; }
        .hist-brand { font-weight: 700; letter-spacing: .04em; color: var(--h-ink); font-size: 1rem; }
        .hist-top .grow { flex: 1 1 auto; }
        .hist-sair {
            flex: 0 0 auto; padding: 9px 16px; border-radius: 11px;
            background: #EAD298; color: #23211c; border: 1px solid #EAD298;
            font-weight: 700; font-size: .9rem; cursor: pointer;
        }
        .hist-sair:hover { background: #e0c479; }

        .hist-page h1 {
            font-family: ui-serif, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
            font-weight: 600; font-size: 1.45rem; letter-spacing: -0.01em;
            margin: 16px 2px 4px; color: var(--h-ink);
        }
        .hist-page .intro { color: var(--h-muted); font-size: .9rem; margin: 0 2px 14px; line-height: 1.5; }

        .hist-page .card {
            background: var(--h-card); border: 1px solid var(--h-line);
            border-radius: 16px; box-shadow: 0 1px 2px rgba(20,18,12,.03);
            padding: 16px 16px; margin-bottom: 14px;
        }
        .hist-page .card h3 { color: var(--h-ink); font-size: 1.05rem; margin: 0 0 8px; }
        .hist-page .card h4 { color: var(--h-ink); font-size: .98rem; margin: 14px 0 8px; }

        /* Cada viagem: cartão branco compacto, texto menor, botão que ocupa a largura */
        .hist-page .ride-item {
            display: block; background: #fff; border: 1px solid var(--h-line);
            border-radius: 14px; padding: 14px 14px; margin: 0 0 12px;
        }
        .hist-page .ride-info strong { font-size: .98rem; color: var(--h-ink); line-height: 1.35; }
        .hist-page .ride-info small { color: var(--h-muted); font-size: .82rem; line-height: 1.5; }
        .hist-page .ride-item .btn {
            display: block; width: 100%; margin-top: 12px; text-align: center;
            padding: 11px 14px; border-radius: 11px; font-size: .9rem; font-weight: 700;
            background: #EAD298; color: #23211c; border: 1px solid #EAD298; cursor: pointer;
        }
        .hist-page .ride-item .btn:hover { background: #e0c479; }
        .hist-page .map-box { border-radius: 12px; overflow: hidden; border: 1px solid var(--h-line); }
        .hist-page .foto-card { border-color: var(--h-line); }
        .hist-page .cam-hint { color: var(--h-muted); font-size: .85rem; }
    </style>
</head>
<body class="app-mobile hist-page">
    <header class="hist-top">
        <a href="dashboard.html" class="hist-back" aria-label="Voltar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <span class="hist-brand">VAP</span>
        <span class="grow"></span>
        <button onclick="logout()" class="hist-sair">Sair</button>
    </header>

    <div class="container">
        <h1>Minhas viagens</h1>
        <p class="intro">Cada viagem guarda a rota percorrida e as fotos de segurança (selfies e foto do carro) com data e local — registro para sua proteção.</p>
        <div id="listaViagens"></div>

        <div id="detalhe" class="card" style="display:none;">
            <h3>Detalhe da viagem</h3>
            <div id="detalheInfo"></div>
            <div id="mapDetalhe" class="map-box"></div>
            <h4>Fotos de segurança</h4>
            <div id="fotosSeg" class="fotos-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
    checkAuth();

    async function carregar() {
        const r = await fetchWithAuth('/api/viagens');
        const viagens = await r.json();
        const div = document.getElementById('listaViagens');
        if (!viagens.length) { div.innerHTML = '<p class="cam-hint">Nenhuma viagem ainda.</p>'; return; }
        div.innerHTML = viagens.map(v => `
            <div class="ride-item">
                <div class="ride-info">
                    <strong>${esc(v.origem_texto || 'Origem')} → ${esc(v.destino_texto || 'Destino')}</strong><br>
                    <small>Motorista: ${esc(v.motorista_nome)} • Passageiro: ${esc(v.passageiro_nome)}</small><br>
                    <small>${fmtData(v.iniciada_em)} • ${v.status}${v.distancia_km ? ' • ' + v.distancia_km + ' km' : ''} • ${v.qtd_pontos} pontos GPS</small>
                </div>
                <button class="btn" onclick="ver(${v.id})">Ver rota e fotos</button>
            </div>`).join('');
    }

    async function ver(id) {
        const r = await fetchWithAuth('/api/viagens/' + id);
        const v = await r.json();
        document.getElementById('detalhe').style.display = 'block';
        document.getElementById('detalheInfo').innerHTML = `
            <p><strong>Rota:</strong> ${esc(v.origem_texto || '—')} → ${esc(v.destino_texto || '—')}</p>
            <p><strong>Motorista:</strong> ${esc(v.motorista_nome)} ${v.placa ? '• ' + esc(v.placa) : ''} ${v.tag ? '(TAG ' + esc(v.tag) + ')' : ''}</p>
            <p><strong>Passageiro:</strong> ${esc(v.passageiro_nome)}</p>
            <p><strong>Início:</strong> ${fmtData(v.iniciada_em)} • <strong>Fim:</strong> ${fmtData(v.finalizada_em)} • <strong>Distância:</strong> ${v.distancia_km || 0} km</p>`;

        const g = await carregarMaps();
        const pts = (v.pontos || []).map(p => ({ lat: +p.lat, lng: +p.lng }));
        const centro = pts[0] || (v.origem_lat ? { lat: +v.origem_lat, lng: +v.origem_lng } : { lat: -6.40, lng: -49.85 });
        const map = new g.maps.Map(document.getElementById('mapDetalhe'), opcoesMapa({ center: centro, zoom: 14 }));
        if (pts.length) {
            new g.maps.Polyline({ path: pts, strokeColor: '#00a9ce', strokeWeight: 5, map });
            criarMarcador({ position: pts[0], map, label: 'A' });
            criarMarcador({ position: pts[pts.length - 1], map, label: 'B' });
        }

        const fotos = [
            { url: v.motorista_selfie, t: 'Selfie do motorista', quem: esc(v.motorista_nome || ''), em: v.motorista_selfie_em },
            { url: v.passageiro_selfie || v.pedido_selfie, t: 'Selfie do passageiro', quem: esc(v.passageiro_nome || ''), em: v.passageiro_selfie_em || v.pedido_selfie_em },
            { url: v.foto_carro_url, t: 'Foto do veículo', quem: v.placa ? esc(v.placa) : '', em: v.foto_carro_em },
        ].filter(f => f.url);
        document.getElementById('fotosSeg').innerHTML = fotos.map(f => `
            <div class="foto-card">
                <img src="${esc(f.url)}">
                <small><strong>${esc(f.t)}</strong>${f.quem ? ' — ' + f.quem : ''}<br>${f.em ? fmtData(f.em) : 'Sem data registrada'}</small>
            </div>`).join('') || '<p class="cam-hint">Sem fotos registradas.</p>';

        document.getElementById('detalhe').scrollIntoView({ behavior: 'smooth' });
    }

    function fecharCamadaVoltar() {
        const det = document.getElementById('detalhe');
        if (det && det.style.display === 'block') {
            det.style.display = 'none';
            return true;
        }
        return false;
    }

    instalarGuardaVoltar(fecharCamadaVoltar, { bloquearSaida: false });
    carregar();
    </script>
</body>
</html>
