    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0; /* Fundo geral */
        }

        /* Card principal (layout novo) */
        .login-card {
            width: 400px;
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            color: #EAD298; /* bege/dourado */

            background-color: #000000;

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Profundidade */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        .icon-paw {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            fill: #EAD298;
        }

        /* Mensagem de erro original */
        .error-message {
            margin-bottom: 15px;
            padding: 10px 12px;
            border-radius: 8px;
            background-color: rgba(255, 99, 71, 0.08);
            color: #ffb3b3;
            font-size: 0.85rem;
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(234, 210, 152, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            border-color: #EAD298;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #EAD298;
            color: #0F3D3E;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .register-link {
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .register-link a {
            color: #EAD298;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .footer {
            position: fixed;
            bottom: 12px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #777;
        }

    <div class="login-card">
        <div class="content-wrapper">
            <img src="/logo-vap.png" class="login-logo" alt="VAP — Conectando Pessoas">
            <h2>S11D · CARONAS INTERNAS</h2>

            <!-- MENSAGEM DE ERRO (mesmo id do original) -->
            <div id="errorMessage" class="error-message"></div>

            <!-- FORM ORIGINAL (mesmo id e mesmos ids de campo) -->
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="matricula" required placeholder="Matrícula">
                    <input type="password" id="senha" required placeholder="Senha">
                </div>

                <button type="submit">ENTRAR</button>

                <div class="register-link">
                    <a href="registro.html">Criar conta</a>
                </div>
                <div class="register-link">
                    <a href="#" id="linkRecuperar">Esqueceu a senha?</a>
                </div>
                <div class="register-link" style="margin-top:10px;font-size:.85rem;opacity:.75;">
                    <a href="politica-privacidade.html">Política de Privacidade</a>
                </div>
            </form>

            <!-- RECUPERAÇÃO DE SENHA: matrícula + email → link por email -->
            <form id="recuperarForm" style="display:none;">
                <p style="color:#EAD298;font-size:13px;margin-bottom:12px;line-height:1.4;">
                    Informe matrícula e email cadastrados. Enviaremos um link para criar uma nova senha de 6 dígitos.
                </p>
                <div class="input-group">
                    <input type="text" id="rec_matricula" required placeholder="Matrícula">
                    <input type="email" id="rec_email" required placeholder="Email cadastrado">
                </div>
                <button type="submit">ENVIAR LINK</button>
                <div class="register-link">
                    <a href="#" id="linkVoltarLogin">Voltar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        © 2025 Vale S11D
    </div>

    <!-- SCRIPT ORIGINAL INTACTO -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const matricula = document.getElementById('matricula').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matricula, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.removeItem('papel');   // novo login → pergunta o papel
                    window.location.href = data.user.is_admin ? 'admin.html' : 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Erro ao fazer login';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Erro de conexão. Tente novamente.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
    <script>
        // Alterna entre o login e o formulário de recuperação de senha.
        (function () {
            const loginForm = document.getElementById('loginForm');
            const recForm = document.getElementById('recuperarForm');
            const errDiv = document.getElementById('errorMessage');
            function mostrar(qual) {
                errDiv.style.display = 'none';
                errDiv.style.color = '';
                loginForm.style.display = qual === 'login' ? 'block' : 'none';
                recForm.style.display = qual === 'rec' ? 'block' : 'none';
            }
            document.getElementById('linkRecuperar').addEventListener('click', (e) => { e.preventDefault(); mostrar('rec'); });
            document.getElementById('linkVoltarLogin').addEventListener('click', (e) => { e.preventDefault(); mostrar('login'); });
            if (location.hash === '#recuperar') mostrar('rec');

            recForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const matricula = document.getElementById('rec_matricula').value;
                const email = document.getElementById('rec_email').value;
                try {
                    const r = await fetch('/api/recuperar-senha/solicitar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ matricula, email })
                    });
                    const data = await r.json();
                    errDiv.textContent = data.message || data.error || '';
                    errDiv.style.display = 'block';
                    errDiv.style.color = r.ok ? '#22c55e' : '';
                    if (r.ok) { recForm.reset(); setTimeout(() => mostrar('login'), 4000); }
                } catch (_) {
                    errDiv.textContent = 'Erro de conexão. Tente novamente.';
                    errDiv.style.display = 'block';
                }
            });
        })();
    </script>
