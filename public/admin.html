<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F3D3E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VAP">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="/pwa.js" defer></script>
    <title>VAP - Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-left">
            <img src="/logo-vap.png" class="nav-logo" alt="VAP">
            <span class="nav-tag">ADMIN</span>
        </div>
        <div class="nav-links">
            <span id="userName">Admin</span>
            <a href="dashboard.html" class="btn btn-secondary btn-sm">App</a>
            <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="card">
        <h3>Resetar senha de usuário</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Matrícula</label>
                <input id="matReset" placeholder="Matrícula do usuário">
            </div>
        </div>
        <button class="btn btn-secondary" onclick="resetSenha()">Resetar para 123456</button>
    </div>

    <div class="card">
        <h3>Viagens recentes</h3>
        <div id="listaViagens"></div>
    </div>
</div>

<script>
checkAuth(true);

async function carregar() {
    const r = await fetchWithAuth('/api/admin/overview');
    const d = await r.json();
    if (!r.ok) return;

    document.getElementById('statsGrid').innerHTML = `
        ${statCard(ADM_ICN.users, d.totalUsuarios, 'Usuários')}
        ${statCard(ADM_ICN.car, d.caronasAtivas, 'Caronas ativas')}
        ${statCard(ADM_ICN.person, d.pedidosAbertos, 'Pedidos abertos')}
        ${statCard(ADM_ICN.nav, d.viagensEmAndamento, 'Viagens em andamento')}
        ${statCard(ADM_ICN.check, d.viagensConcluidas, 'Viagens concluídas')}`;

    document.getElementById('listaViagens').innerHTML = (d.viagens || []).map(v => `
        <div class="agendamento-item ${v.status === 'concluida' ? 'completed' : v.status === 'em_andamento' ? 'in-progress' : ''}">
            <div class="agendamento-header">
                <strong>${v.motorista_nome} → ${v.passageiro_nome}</strong>
                <span class="badge ${v.status === 'concluida' ? 'badge-ativo' : 'badge-em-uso'}">${v.status}</span>
            </div>
            <small>${fmtData(v.iniciada_em)}${v.distancia_km ? ' • ' + v.distancia_km + ' km' : ''}</small>
        </div>`).join('') || '<p class="cam-hint">Nenhuma viagem ainda.</p>';
}

const ADM_ICN = {
    users: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0F3D3E" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 6a3 3 0 0 1 0 6"/><path d="M18.5 19a5.5 5.5 0 0 0-3-5"/></svg>',
    car: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0F3D3E" stroke-width="2" stroke-linejoin="round"><path d="M3 13l2-5.5A2 2 0 0 1 6.9 6h10.2a2 2 0 0 1 1.9 1.5L21 13v5h-2v-2H5v2H3z"/><circle cx="7.5" cy="16" r="1.2" fill="#0F3D3E"/><circle cx="16.5" cy="16" r="1.2" fill="#0F3D3E"/></svg>',
    person: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0F3D3E" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>',
    nav: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0F3D3E" stroke-width="2" stroke-linejoin="round"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>',
    check: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><circle cx="12" cy="12" r="9" stroke="#0F3D3E"/><path d="M8 12l3 3 5-6"/></svg>',
};
function statCard(icon, num, label) {
    return `<div class="stat-card"><span class="stat-icon">${icon}</span><h3>${num}</h3><p>${label}</p></div>`;
}

async function resetSenha() {
    const matricula = document.getElementById('matReset').value.trim();
    if (!matricula) return;
    const r = await fetchWithAuth('/api/admin/reset-senha', { method: 'POST', body: JSON.stringify({ matricula }) });
    const d = await r.json();
    mostrarToast(d.message || d.error || 'Concluído', r.ok ? 'success' : 'error');
}

carregar();
</script>
</body>
</html>
