<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagão — preview da tela de mapa</title>
<style>
  :root { --teal:#0F3D3E; --gold:#EAD298; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  body { background:#0b1413; display:flex; justify-content:center; }
  .phone { width:100%; max-width:430px; min-height:100vh; background:#e8efe9; position:relative; overflow:hidden; box-shadow:0 0 40px rgba(0,0,0,.5); }

  /* Navbar */
  .nav { background:var(--teal); color:#fff; padding:14px 16px; display:flex; align-items:center; gap:10px; position:relative; z-index:5; }
  .nav h1 { font-size:20px; letter-spacing:1px; }
  .nav small { display:block; font-size:11px; opacity:.7; font-weight:400; letter-spacing:.3px; }

  /* "Mapa" */
  .map { position:relative; height:560px; background:
        linear-gradient(0deg, rgba(0,0,0,.03), rgba(0,0,0,.03)),
        repeating-linear-gradient(0deg,  #dfe7e0 0 38px, #d4ddd5 38px 40px),
        repeating-linear-gradient(90deg, #dfe7e0 0 38px, #d4ddd5 38px 40px);
        overflow:hidden; }
  /* avenidas */
  .av { position:absolute; background:#f3f7f3; }
  .av.h { left:0; right:0; height:26px; }
  .av.v { top:0; bottom:0; width:26px; }
  .av.h1{ top:120px } .av.h2{ top:330px } .av.v1{ left:70px } .av.v2{ left:250px }
  .blk { position:absolute; background:#cdd8ce; border-radius:4px; opacity:.55; }

  /* rota traçada */
  .route { position:absolute; inset:0; pointer-events:none; }
  .route path { fill:none; stroke:var(--teal); stroke-width:7; stroke-linecap:round; opacity:.9; }
  .route .glow { stroke:#1f6e6b; stroke-width:13; opacity:.25; }

  /* marcadores */
  .mk { position:absolute; transform:translate(-50%,-50%); }
  .mk.car svg { filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
  .mk.faint { opacity:.45; }
  .pin { width:30px; height:30px; }

  /* card ETA */
  .eta { position:absolute; top:14px; left:14px; right:14px; background:var(--teal); color:var(--gold);
         padding:12px 14px; border-radius:12px; font-weight:600; font-size:14px; display:flex; align-items:center; gap:8px;
         box-shadow:0 6px 16px rgba(0,0,0,.25); z-index:4; }

  /* painel inferior */
  .sheet { position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:18px 18px 0 0;
           padding:16px 18px 24px; box-shadow:0 -6px 20px rgba(0,0,0,.15); z-index:6; }
  .grab { width:42px; height:5px; background:#d0d6d0; border-radius:3px; margin:0 auto 12px; }
  .sheet h3 { font-size:16px; color:var(--teal); margin-bottom:8px; }
  .row { font-size:14px; color:#374; margin:3px 0; color:#3a4a44; }
  .row strong { color:#16241f; }
  .btns { display:flex; gap:10px; margin-top:14px; }
  .btn { flex:1; padding:12px; border:none; border-radius:10px; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; gap:7px; }
  .btn.wpp { background:#22c55e; color:#fff; }
  .btn.fin { background:#ef4444; color:#fff; }
  .tag { display:inline-block; background:#dcfce7; color:#166534; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
</style>
</head>
<body>
<div class="phone">

  <!-- Navbar com a logo (carro dourado) -->
  <div class="nav">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#EAD298" stroke-width="2" stroke-linejoin="round"><path d="M3 13l2-5.5A2 2 0 0 1 6.9 6h10.2a2 2 0 0 1 1.9 1.5L21 13v5h-2v-2H5v2H3z"/><circle cx="7.5" cy="16" r="1.2" fill="#EAD298"/><circle cx="16.5" cy="16" r="1.2" fill="#EAD298"/></svg>
    <div><h1>VAGÃO</h1><small>Carona entre colaboradores</small></div>
  </div>

  <div class="map">
    <div class="av h h1"></div><div class="av h h2"></div>
    <div class="av v v1"></div><div class="av v v2"></div>
    <div class="blk" style="top:30px;left:90px;width:140px;height:70px"></div>
    <div class="blk" style="top:160px;left:20px;width:40px;height:140px"></div>
    <div class="blk" style="top:160px;left:280px;width:120px;height:140px"></div>
    <div class="blk" style="top:370px;left:90px;width:140px;height:120px"></div>

    <!-- card de ETA (igual ao do app durante a viagem) -->
    <div class="eta">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 13l2-5.5A2 2 0 0 1 6.9 6h10.2a2 2 0 0 1 1.9 1.5L21 13v5h-2v-2H5v2H3z"/><circle cx="7.5" cy="16" r="1.2" fill="currentColor"/><circle cx="16.5" cy="16" r="1.2" fill="currentColor"/></svg>
      Motorista a caminho • chega em ~4 min (1,8 km)
    </div>

    <!-- rota traçada (Directions) -->
    <svg class="route" viewBox="0 0 430 560" preserveAspectRatio="none">
      <path class="glow" d="M95 430 C 95 360, 180 360, 200 300 S 300 200, 300 130"/>
      <path d="M95 430 C 95 360, 180 360, 200 300 S 300 200, 300 130"/>
    </svg>

    <!-- pino de destino (verde) -->
    <div class="mk" style="left:300px;top:130px">
      <svg class="pin" viewBox="0 0 24 24" fill="#22c55e" stroke="#0f5132" stroke-width="1"><path d="M12 22s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="10" r="2.6" fill="#fff"/></svg>
    </div>

    <!-- carro do motorista (estilo Uber, vista de cima) -->
    <div class="mk car" style="left:95px;top:430px">
      <svg width="46" height="46" viewBox="0 0 64 64">
        <rect x="8" y="14" width="6" height="12" rx="3" fill="#15211f"/><rect x="50" y="14" width="6" height="12" rx="3" fill="#15211f"/>
        <rect x="8" y="38" width="6" height="12" rx="3" fill="#15211f"/><rect x="50" y="38" width="6" height="12" rx="3" fill="#15211f"/>
        <rect x="14" y="6" width="36" height="52" rx="14" fill="#0F3D3E" stroke="#fff" stroke-width="2"/>
        <path d="M18 20 Q32 14 46 20 L44 28 Q32 24 20 28 Z" fill="#EAD298"/>
        <rect x="20" y="30" width="24" height="13" rx="4" fill="#13514f"/>
        <path d="M20 45 Q32 41 44 45 L45 50 Q32 54 19 50 Z" fill="#9ec6c2"/>
      </svg>
    </div>

    <!-- outros motoristas online (mais fracos) -->
    <div class="mk car faint" style="left:330px;top:420px"><svg width="40" height="40" viewBox="0 0 64 64"><rect x="14" y="6" width="36" height="52" rx="14" fill="#0F3D3E" stroke="#fff" stroke-width="2"/><path d="M18 20 Q32 14 46 20 L44 28 Q32 24 20 28 Z" fill="#EAD298"/><rect x="20" y="30" width="24" height="13" rx="4" fill="#13514f"/></svg></div>
    <div class="mk car faint" style="left:60px;top:180px"><svg width="40" height="40" viewBox="0 0 64 64"><rect x="14" y="6" width="36" height="52" rx="14" fill="#0F3D3E" stroke="#fff" stroke-width="2"/><path d="M18 20 Q32 14 46 20 L44 28 Q32 24 20 28 Z" fill="#EAD298"/><rect x="20" y="30" width="24" height="13" rx="4" fill="#13514f"/></svg></div>
  </div>

  <!-- painel inferior (viagem em andamento) -->
  <div class="sheet">
    <div class="grab"></div>
    <h3>Viagem em andamento <span class="tag">ao vivo</span></h3>
    <p class="row"><strong>Motorista:</strong> Carlos M. • ABC-1D23 (TAG 4417)</p>
    <p class="row"><strong>Passageiro:</strong> Você</p>
    <p class="row"><strong>Status:</strong> a caminho do embarque</p>
    <div class="btns">
      <a class="btn wpp"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 3h3l2 5-2 1.5a11 11 0 0 0 5.5 5.5L18 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 4 5a2 2 0 0 1 2-2z"/></svg> Contato</a>
      <button class="btn fin"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6L6 18"/></svg> Finalizar</button>
    </div>
  </div>

</div>
</body>
</html>
